<!doctype html><html lang="id"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLM Fundamentals — Quiz</title>
<style>
:root{--bg:#1A1A2E;--card:#2D2D44;--green:#76B900;--lgreen:#A3D944;--white:#fff;
--gray:#AAAACC;--red:#EF5350;--dark:#23233A;}
*{box-sizing:border-box;}
body{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
margin:0;background:var(--bg);color:var(--white);line-height:1.45;}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 60px;}
header{background:linear-gradient(135deg,var(--green),#5a8c00);border-radius:12px;
padding:16px 20px;margin-bottom:14px;}
header .mod{font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:.9;}
header h1{margin:2px 0 0;font-size:24px;}
header p{margin:4px 0 0;font-size:13px;opacity:.95;}
.scorebar{position:sticky;top:0;z-index:5;background:var(--dark);border:1px solid var(--card);
border-radius:10px;padding:8px 14px;margin-bottom:14px;display:flex;justify-content:space-between;
align-items:center;font-size:13px;}
.scorebar b{color:var(--lgreen);}
.q{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:12px;
border-left:4px solid var(--green);}
.q .num{color:var(--green);font-weight:700;font-size:12px;}
.q .text{font-size:15px;font-weight:600;margin:4px 0 8px;}
.q pre{background:var(--bg);color:var(--lgreen);font-family:"SF Mono",Menlo,Consolas,monospace;
font-size:12.5px;padding:9px 11px;border-radius:6px;overflow-x:auto;margin:0 0 9px;}
.opt{display:block;width:100%;text-align:left;background:var(--dark);color:var(--white);
border:1.5px solid #3a3a55;border-radius:8px;padding:9px 12px;margin:6px 0;font-size:14px;
cursor:pointer;transition:.12s;}
.opt:hover:not(.locked){border-color:var(--green);}
.opt .lab{display:inline-block;width:20px;font-weight:700;color:var(--gray);}
.opt.correct{background:rgba(118,185,0,.18);border-color:var(--green);}
.opt.correct .lab{color:var(--green);}
.opt.wrong{background:rgba(239,83,80,.16);border-color:var(--red);}
.opt.wrong .lab{color:var(--red);}
.opt.locked{cursor:default;}
.expl{display:none;font-size:13px;color:var(--gray);background:var(--bg);
border-radius:6px;padding:8px 11px;margin-top:8px;border-left:3px solid var(--lgreen);}
.expl.show{display:block;}
.expl b{color:var(--lgreen);}
.summary{display:none;background:var(--card);border-radius:12px;padding:20px;text-align:center;
margin-top:8px;border:2px solid var(--green);}
.summary.show{display:block;}
.summary .big{font-size:34px;font-weight:800;color:var(--green);}
.summary .msg{font-size:15px;color:var(--gray);margin:6px 0 14px;}
.btn{background:var(--green);color:#0d0d0d;border:none;border-radius:8px;padding:10px 22px;
font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{background:var(--lgreen);}
footer{text-align:center;color:var(--gray);font-size:11px;margin-top:18px;opacity:.7;}
</style></head>
<body><div class="wrap">
<header><div class="mod">Module 04 · Quiz Latihan</div><h1>LLM Fundamentals</h1>
<p>30 soal pilihan ganda · gaya sertifikasi · pilih satu jawaban</p></header>
<div class="scorebar"><span>Terjawab: <b id="answered">0</b> / 30</span>
<span>Benar: <b id="correct">0</b></span></div>
<div id="quiz"></div>
<div class="summary" id="summary"><div class="big" id="finalscore"></div>
<div class="msg" id="finalmsg"></div><button class="btn" onclick="location.reload()">Ulangi Quiz</button></div>
<footer>Navasena Gen-ML Course · Module 04 LLM Fundamentals — Quiz</footer>
</div>
<script>
const QUIZ = {"module": "04", "title": "LLM Fundamentals", "questions": [
{"q": "Bagaimana hubungan NLP dan LLM yang benar?", "code": null, "options": ["LLM bidang luas, NLP salah satu modelnya", "NLP dan LLM sama persis, beda nama saja", "NLP bidang luas pemrosesan bahasa; LLM salah satu jenis model NLP", "NLP dan LLM tidak berhubungan"], "answer": 2, "explanation": "NLP adalah bidang luas (klasifikasi, terjemahan, dll). LLM adalah satu jenis model NLP berbasis transformer yang dilatih pada teks masif."},
{"q": "Apa keunggulan utama Transformer (2017) dibanding RNN/LSTM?", "code": null, "options": ["Memproses semua kata sekaligus (paralel) lewat attention, bukan satu per satu", "Tidak butuh data pelatihan", "Hanya bisa bahasa Inggris", "Mengubah kata menjadi gambar"], "answer": 0, "explanation": "RNN/LSTM membaca kata satu per satu (lambat, mudah lupa). Transformer membaca seluruh kalimat sekaligus lewat attention."},
{"q": "Apa itu tokenization?", "code": null, "options": ["Menerjemahkan teks ke bahasa Inggris", "Memecah teks jadi token (sering subword) lalu memetakan tiap token ke ID angka", "Mengubah teks menjadi gambar", "Menghapus semua kata yang jarang"], "answer": 1, "explanation": "Model membaca angka, bukan huruf. Tokenization memecah teks jadi token (potongan kata) dan memberi tiap token sebuah ID angka."},
{"q": "Apa fungsi embedding?", "code": null, "options": ["Mengubah tiap token jadi vektor angka, di mana makna mirip menghasilkan vektor mirip", "Mengurutkan token dari kecil ke besar", "Menghapus token duplikat", "Mengubah token kembali jadi huruf"], "answer": 0, "explanation": "Embedding mengubah token jadi deret angka (vektor). Kata bermakna mirip ('raja','ratu') punya vektor berdekatan — inilah cara model 'memahami' makna."},
{"q": "Dalam analogi diskusi kelompok untuk attention, apa peran Query (Q), Key (K), dan Value (V)?", "code": null, "options": ["Q,K,V semuanya sama, hanya cadangan", "Q=pertanyaan tiap kata, K=name-tag/label keahlian, V=isi informasi kata", "Q=jawaban akhir, K=nomor urut, V=warna", "Q=kecepatan, K=memori, V=suhu"], "answer": 1, "explanation": "Tiap kata mengajukan pertanyaan (Q), punya name-tag keahlian (K), dan isi informasi (V). Attention mencocokkan Q ke semua K lalu mengambil campuran berbobot dari V (lalu dirangkum lewat O)."},
{"q": "Setelah Q, K, V menghasilkan campuran berbobot, apa peran proyeksi Output (O)?", "code": null, "options": ["O menghapus token yang tak penting", "O merangkum hasil tiap head jadi satu representasi baru untuk layer berikutnya", "O menambah jumlah parameter saja", "O menerjemahkan ke bahasa lain"], "answer": 1, "explanation": "Q/K/V menghasilkan campuran informasi; proyeksi O menggabungkan hasil semua head menjadi satu vektor keluaran — 'merangkum hasil diskusi' sebelum diteruskan ke layer berikutnya."},
{"q": "Apa fungsi causal mask (segitiga) pada self-attention?", "code": null, "options": ["Menutup token di kanan supaya tiap kata tak melihat masa depan (paksa prediksi kiri-ke-kanan)", "Mempercepat GPU", "Menghapus token jarang", "Mengubah token jadi gambar"], "answer": 0, "explanation": "Causal mask menyetel skor ke arah token masa depan jadi minus tak hingga sebelum softmax, sehingga model hanya memakai konteks kiri saat menebak token berikutnya."},
{"q": "Apa arti LLM bersifat 'autoregressive' saat menghasilkan teks?", "code": null, "options": ["Menghasilkan seluruh kalimat sekaligus dalam satu langkah", "Memprediksi 1 token, token itu jadi input untuk token berikutnya, diulang terus", "Hanya bisa membaca, tidak bisa menulis", "Menebak dari kata terakhir ke kata pertama"], "answer": 1, "explanation": "LLM menulis token demi token: prediksi satu token, tambahkan ke input, prediksi berikutnya, begitu seterusnya."},
{"q": "Saat LLM menulis token demi token, kenapa KV-cache mempercepat?", "code": null, "options": ["Menyimpan Key & Value token sebelumnya agar tak dihitung ulang tiap langkah", "Menyimpan jawaban akhir di disk", "Mengecilkan ukuran model", "Mengganti GPU dengan CPU"], "answer": 0, "explanation": "Tanpa cache, tiap token baru menghitung ulang K/V seluruh konteks. KV-cache menyimpannya sehingga tiap langkah hanya menghitung token terbaru — jauh lebih cepat."},
{"q": "Mana pernyataan paling tepat tentang jumlah parameter LLM?", "code": null, "options": ["Parameter tidak berpengaruh sama sekali", "Makin sedikit parameter selalu makin baik", "Umumnya makin banyak parameter makin mampu, tapi kualitas data & arsitektur sama penting", "Parameter satu-satunya penentu kepintaran"], "answer": 2, "explanation": "Lebih banyak parameter membantu menangkap pola (sampai titik tertentu), tapi data berkualitas, arsitektur, dan fine-tuning sama pentingnya."},
{"q": "Kenapa model chat perlu format ChatML (apply_chat_template), bukan string biasa?", "code": null, "options": ["Supaya model lebih kecil", "Supaya tak butuh GPU", "Karena model instruct dilatih dengan format token khusus (peran system/user); template menyusunnya persis seperti saat training", "Karena string manual dilarang Python"], "answer": 2, "explanation": "Model instruct belajar dari format ChatML (token spesial seperti <|im_start|>). apply_chat_template menyusun pesan + system prompt persis format itu — hasilnya jauh lebih baik daripada string mentah."},
{"q": "Apa pengaruh parameter temperature pada generasi teks?", "code": null, "options": ["Rendah = output fokus/konsisten; tinggi = lebih kreatif/acak", "Rendah = acak; tinggi = fokus", "Mengatur jumlah parameter model", "Menentukan bahasa output"], "answer": 0, "explanation": "Temperature rendah membuat model memilih kata paling mungkin (fokus); tinggi memberi peluang kata lain (kreatif tapi bisa ngawur)."},
{"q": "Apa beda zero-shot dan few-shot prompting?", "code": null, "options": ["Few-shot memberi beberapa contoh di prompt agar model meniru pola, tanpa training ulang", "Few-shot melatih ulang seluruh model", "Zero-shot butuh GPU lebih besar", "Keduanya sama persis"], "answer": 0, "explanation": "Zero-shot langsung bertanya tanpa contoh; few-shot menaruh beberapa contoh input-output di prompt (in-context learning) sehingga model meniru polanya — tanpa mengubah bobot model."},
{"q": "Saat quantization 4-bit di Colab T4, kenapa compute-nya harus float16, bukan bfloat16?", "code": null, "options": ["float16 paling akurat dari semua tipe", "T4 (compute 7.5) tidak mendukung bfloat16 — bfloat16 akan crash; float16 aman", "float16 membuat model lebih besar", "Bebas, sama saja"], "answer": 1, "explanation": "GPU T4 punya compute capability 7.5 (di bawah 8.0) sehingga tidak mendukung bfloat16. Menyetel compute ke bfloat16 menyebabkan error; gunakan float16."},
{"q": "Kenapa model 7B perlu quantization 4-bit agar muat di T4 16GB?", "code": null, "options": ["Karena 4-bit membuat model lebih pintar", "Karena T4 hanya bisa 4-bit", "Bobot 7B fp16 ~14 GB (+overhead → OOM); dalam 4-bit hanya ~5,5 GB sehingga muat", "Karena 4-bit mempercepat internet"], "answer": 2, "explanation": "7B × 2 byte (fp16) ≈ 14 GB bobot, plus aktivasi → melebihi 16 GB (OOM). NF4 4-bit menyusutkan bobot jadi ~4–5,5 GB sehingga muat nyaman."},
{"q": "Kenapa batching pada model decoder-only butuh padding di kiri (padding_side='left')?", "code": null, "options": ["Agar posisi token terakhir (tempat generasi mulai) sejajar untuk semua prompt; padding kanan merusak generasi", "Agar model lebih kecil", "Karena GPU hanya membaca dari kiri", "Supaya output berbahasa Indonesia"], "answer": 0, "explanation": "Model decoder-only melanjutkan dari token terakhir. Dengan panjang prompt beragam, padding di kiri membuat posisi akhir sejajar; padding kanan menaruh token padding di posisi generasi sehingga merusak hasil."},
{"q": "Kenapa LLM butuh RAG?", "code": null, "options": ["Supaya model lebih cepat", "Model bisa halusinasi & punya knowledge cutoff; RAG memberi 'buku contekan' dokumen relevan ke prompt", "Supaya tak butuh tokenizer", "Supaya parameter bertambah"], "answer": 1, "explanation": "LLM bisa mengarang (halusinasi) dan tak tahu data terbaru/privat (knowledge cutoff). RAG mengambil dokumen relevan lalu menyisipkannya ke prompt agar jawaban akurat dan terkini."},
{"q": "Apa inti dari metode LoRA?", "code": null, "options": ["Melatih ulang seluruh parameter dari nol", "Membekukan model raksasa, lalu menambah & melatih matriks 'adapter' kecil (sekitar 1% parameter)", "Menghapus separuh layer model", "Mengubah model jadi gambar"], "answer": 1, "explanation": "Analogi sticky-note: daripada menulis ulang seluruh 'buku' (semua bobot), LoRA membekukan model dan hanya melatih adapter kecil (~1%) — jauh lebih murah & cepat."},
{"q": "Apa yang ditambahkan QLoRA dibanding LoRA biasa?", "code": null, "options": ["Tidak ada bedanya", "QLoRA melatih semua parameter", "Model dasar di-quantize ke 4-bit dulu, baru ditambah adapter LoRA — sehingga model besar muat di GPU kecil", "QLoRA hanya untuk gambar"], "answer": 2, "explanation": "Analogi: kecilkan dulu buku jadi edisi saku 4-bit, baru tempel sticky-note. QLoRA = base 4-bit + adapter LoRA → bisa fine-tune model lebih besar di T4."},
{"q": "Bagaimana membuktikan model fine-tuned benar-benar belajar hal baru, memakai satu model yang sama?", "code": null, "options": ["Memuat dua model terpisah", "Matikan adapter sementara untuk dapat jawaban BASE, lalu nyalakan lagi untuk jawaban FINE-TUNED — bandingkan", "Hapus model dari memori", "Latih ulang dari nol"], "answer": 1, "explanation": "Dengan mematikan adapter sementara kita mendapat perilaku base; menyalakannya memberi perilaku fine-tuned. Membandingkan keduanya dari satu model membuktikan adapter-lah yang menambah pengetahuan baru."},
{"q": "Pada fine-tuning QLoRA, apa yang sebenarnya dilatih?", "code": null, "options": ["Hanya adapter kecil (~1-2% parameter); base dibekukan & di-quantize 4-bit", "Seluruh parameter model", "Hanya tokenizer", "Hanya layer terakhir secara penuh"], "answer": 0, "explanation": "QLoRA membekukan base (dalam 4-bit) dan hanya melatih matriks adapter LoRA yang kecil — sekitar 1-2% dari total parameter — jauh lebih murah & cepat."},
{"q": "Apa yang diukur metrik ROUGE, BLEU, dan BERTScore?", "code": null, "options": ["Kecepatan GPU saat inferensi", "Jumlah parameter model", "Suhu GPU saat training", "Seberapa dekat output model dengan teks referensi — kemiripan kata atau makna"], "answer": 3, "explanation": "Ketiganya membandingkan output dengan referensi: ROUGE/BLEU melihat tumpang-tindih kata (n-gram), BERTScore melihat kemiripan makna lewat embedding."},
{"q": "Kenapa uji signifikansi (mis. p < 0,05) penting saat membandingkan dua model?", "code": null, "options": ["Untuk memastikan selisih skor benar-benar nyata, bukan kebetulan karena sampel sedikit", "Agar model otomatis lebih cepat", "Untuk menambah parameter model", "Untuk mengganti bahasa output"], "answer": 0, "explanation": "Skor B bisa terlihat lebih tinggi hanya karena kebetulan pada sedikit data. p < 0,05 menandakan selisih cukup kuat untuk disebut nyata. Catatan: LLM-as-judge bisa bias 'self-preference' (memuji output dari keluarganya sendiri)."},
{"q": "Kenapa specialist 0.6B bisa mengalahkan generalist 3B pada tugas ekstraksi JSON?", "code": null, "options": ["'Sempit tapi dalam' — fine-tune fokus satu tugas mengalahkan model umum yang lebih besar di tugas itu", "Karena 0.6B selalu lebih pintar", "Karena model 3B rusak", "Karena 0.6B memakai internet"], "answer": 0, "explanation": "SLM yang di-fine-tune untuk satu tugas spesifik bisa lebih akurat di tugas itu daripada generalist yang jauh lebih besar — spesialisasi mengalahkan generalisasi pada cakupan sempit."},
{"q": "Apa keunggulan SLM yang paling andal di notebook ini?", "code": null, "options": ["Selalu jauh lebih cepat", "Hemat memory — 3,7x lebih sedikit VRAM (kecepatan ternyata ~sama di T4)", "Selalu lebih akurat dari model apa pun", "Tak butuh fine-tuning"], "answer": 1, "explanation": "Kemenangan SLM yang dijamin di sini adalah akurasi-pada-tugas + memory (0,54 GB vs 1,99 GB, sekitar 3,7x lebih hemat). Throughput batch di T4 ternyata ~sama — notebook jujur soal ini."},
{"q": "Apa itu distillation, dan kenapa membuat model kecil sekarang bisa lebih pintar dari model raksasa zaman dulu?", "code": null, "options": ["Model kecil belajar dari output model raksasa, mewarisi kemampuannya", "Menghapus separuh layer model besar", "Menggabungkan dua model jadi satu file", "Menerjemahkan model ke bahasa lain"], "answer": 0, "explanation": "Distillation melatih model kecil meniru output model raksasa, sehingga SLM modern bisa melampaui LLM lama yang jauh lebih besar."},
{"q": "Kenapa satu resep QLoRA bisa menghasilkan specialist untuk banyak tugas berbeda (klasifikasi, sentiment, FAQ)?", "code": null, "options": ["Prosedur fine-tune-nya sama dan dipakai-ulang; yang berubah hanya dataset kecil tiap tugas", "Karena tiap tugas butuh model raksasa", "Karena resepnya berubah total tiap tugas", "Karena base model sudah tahu semuanya"], "answer": 0, "explanation": "Yang dipakai-ulang adalah resep QLoRA (langkah & konfigurasi); yang berbeda hanya data tugas. Maka satu recipe bisa 'mencetak' banyak specialist."},
{"q": "Kenapa adapter LoRA harus di-merge ke base fp16, bukan base 4-bit?", "code": null, "options": ["Merge ke base 4-bit menyuntikkan NaN sehingga output rusak ('GGGG'); reload base fp16 dulu baru merge", "Karena 4-bit lebih lambat", "Karena fp16 lebih kecil dari 4-bit", "Tidak ada bedanya"], "answer": 0, "explanation": "Menggabungkan adapter ke bobot 4-bit yang sudah ter-quantize merusak nilai (NaN) sehingga model menghasilkan gibberish. Aturan emas: reload base fp16, baru attach & merge adapter, lalu export GGUF."},
{"q": "Apa itu GGUF dan tool mana yang cocok untuk edge (Jetson Orin Nano 8GB)?", "code": null, "options": ["GGUF = format file model universal untuk Ollama/llama.cpp; edge pakai Ollama/llama.cpp/TensorRT, sedangkan vLLM/NIM untuk datacenter", "GGUF format gambar; semua tool sama saja", "GGUF hanya untuk cloud", "Jetson 8GB paling cocok pakai vLLM"], "answer": 0, "explanation": "GGUF adalah satu format file yang dibaca Ollama & llama.cpp. Untuk perangkat edge 8 GB pakai Ollama/llama.cpp/TensorRT; vLLM/NIM adalah tool kelas datacenter yang tak muat di edge."},
{"q": "Kenapa kode aplikasi bisa pindah dari Ollama ke vLLM ke NVIDIA NIM hanya dengan ganti beberapa baris?", "code": null, "options": ["Semuanya OpenAI-compatible; cukup ganti base_url (dan api_key/model)", "Karena semuanya memakai model yang sama persis", "Karena kode otomatis menulis ulang dirinya", "Karena GGUF berisi kode aplikasi"], "answer": 0, "explanation": "Ollama, vLLM, dan NIM semuanya mengekspos OpenAI-compatible API. Maka kode client sama; cukup ganti base_url (plus api_key/model) untuk pindah target."}
]};
window.QUIZ = QUIZ;
const LAB = ["A","B","C","D"];
let answered = 0, correct = 0;
const total = QUIZ.questions.length;
const quizEl = document.getElementById("quiz");

QUIZ.questions.forEach((item, qi) => {
  const card = document.createElement("div"); card.className = "q";
  const num = document.createElement("div"); num.className = "num"; num.textContent = "Soal " + (qi+1);
  card.appendChild(num);
  const text = document.createElement("div"); text.className = "text"; text.textContent = item.q;
  card.appendChild(text);
  if (item.code) { const pre = document.createElement("pre"); pre.textContent = item.code; card.appendChild(pre); }
  const expl = document.createElement("div"); expl.className = "expl";
  item.options.forEach((opt, oi) => {
    const b = document.createElement("button"); b.className = "opt";
    const lab = document.createElement("span"); lab.className = "lab"; lab.textContent = LAB[oi] + ".";
    b.appendChild(lab); b.appendChild(document.createTextNode(" " + opt));
    b.onclick = () => {
      if (card.dataset.locked) return;
      card.dataset.locked = "1";
      const opts = card.querySelectorAll(".opt");
      opts.forEach(o => o.classList.add("locked"));
      opts[item.answer].classList.add("correct");
      if (oi === item.answer) { correct++; }
      else { b.classList.add("wrong"); }
      answered++;
      document.getElementById("answered").textContent = answered;
      document.getElementById("correct").textContent = correct;
      expl.classList.add("show");
      if (answered === total) showSummary();
    };
    card.appendChild(b);
  });
  const eb = document.createElement("b"); eb.textContent = "Penjelasan: ";
  expl.appendChild(eb); expl.appendChild(document.createTextNode(item.explanation));
  card.appendChild(expl);
  quizEl.appendChild(card);
});

function showSummary(){
  const pct = Math.round(correct/total*100);
  const s = document.getElementById("summary"); s.classList.add("show");
  document.getElementById("finalscore").textContent = "Skor: " + correct + " / " + total + " (" + pct + "%)";
  let msg = pct>=80 ? "Hebat! Pemahaman kamu solid." : pct>=60 ? "Lumayan — ulas lagi materi yang masih salah." : "Ayo pelajari lagi modulnya, lalu coba ulangi.";
  document.getElementById("finalmsg").textContent = msg;
  s.scrollIntoView({behavior:"smooth"});
}
</script></body></html>
