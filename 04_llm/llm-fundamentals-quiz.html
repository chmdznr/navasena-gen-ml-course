<!doctype html><html lang="id"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLM Fundamentals — Quiz</title>
<style>
:root{--bg:#1A1A2E;--card:#2D2D44;--green:#76B900;--lgreen:#A3D944;--white:#fff;
--gray:#AAAACC;--red:#EF5350;--dark:#23233A;}
*{box-sizing:border-box;}
body{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
margin:0;background:var(--bg);color:var(--white);line-height:1.45;}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 60px;}
header{background:linear-gradient(135deg,var(--green),#5a8c00);border-radius:12px;
padding:16px 20px;margin-bottom:14px;}
header .mod{font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:.9;}
header h1{margin:2px 0 0;font-size:24px;}
header p{margin:4px 0 0;font-size:13px;opacity:.95;}
.scorebar{position:sticky;top:0;z-index:5;background:var(--dark);border:1px solid var(--card);
border-radius:10px;padding:8px 14px;margin-bottom:14px;display:flex;justify-content:space-between;
align-items:center;font-size:13px;}
.scorebar b{color:var(--lgreen);}
.q{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:12px;
border-left:4px solid var(--green);}
.q .num{color:var(--green);font-weight:700;font-size:12px;}
.q .text{font-size:15px;font-weight:600;margin:4px 0 8px;}
.q pre{background:var(--bg);color:var(--lgreen);font-family:"SF Mono",Menlo,Consolas,monospace;
font-size:12.5px;padding:9px 11px;border-radius:6px;overflow-x:auto;margin:0 0 9px;}
.opt{display:block;width:100%;text-align:left;background:var(--dark);color:var(--white);
border:1.5px solid #3a3a55;border-radius:8px;padding:9px 12px;margin:6px 0;font-size:14px;
cursor:pointer;transition:.12s;}
.opt:hover:not(.locked){border-color:var(--green);}
.opt .lab{display:inline-block;width:20px;font-weight:700;color:var(--gray);}
.opt.correct{background:rgba(118,185,0,.18);border-color:var(--green);}
.opt.correct .lab{color:var(--green);}
.opt.wrong{background:rgba(239,83,80,.16);border-color:var(--red);}
.opt.wrong .lab{color:var(--red);}
.opt.locked{cursor:default;}
.expl{display:none;font-size:13px;color:var(--gray);background:var(--bg);
border-radius:6px;padding:8px 11px;margin-top:8px;border-left:3px solid var(--lgreen);}
.expl.show{display:block;}
.expl b{color:var(--lgreen);}
.summary{display:none;background:var(--card);border-radius:12px;padding:20px;text-align:center;
margin-top:8px;border:2px solid var(--green);}
.summary.show{display:block;}
.summary .big{font-size:34px;font-weight:800;color:var(--green);}
.summary .msg{font-size:15px;color:var(--gray);margin:6px 0 14px;}
.btn{background:var(--green);color:#0d0d0d;border:none;border-radius:8px;padding:10px 22px;
font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{background:var(--lgreen);}
footer{text-align:center;color:var(--gray);font-size:11px;margin-top:18px;opacity:.7;}
</style></head>
<body><div class="wrap">
<header><div class="mod">Module 04 · Quiz Latihan</div><h1>LLM Fundamentals</h1>
<p>16 soal pilihan ganda · gaya sertifikasi · pilih satu jawaban</p></header>
<div class="scorebar"><span>Terjawab: <b id="answered">0</b> / 16</span>
<span>Benar: <b id="correct">0</b></span></div>
<div id="quiz"></div>
<div class="summary" id="summary"><div class="big" id="finalscore"></div>
<div class="msg" id="finalmsg"></div><button class="btn" onclick="location.reload()">Ulangi Quiz</button></div>
<footer>Navasena Gen-ML Course · Module 04 LLM Fundamentals — Quiz</footer>
</div>
<script>
const QUIZ = {"module": "04", "title": "LLM Fundamentals", "questions": [{"q": "Bagaimana hubungan NLP dan LLM yang benar?", "code": null, "options": ["LLM bidang luas, NLP salah satu modelnya", "NLP dan LLM sama persis, beda nama saja", "NLP bidang luas pemrosesan bahasa; LLM salah satu jenis model NLP", "NLP dan LLM tidak berhubungan"], "answer": 2, "explanation": "NLP adalah bidang luas (klasifikasi, terjemahan, dll). LLM adalah satu jenis model NLP berbasis transformer yang dilatih pada teks masif."}, {"q": "Apa keunggulan utama Transformer (2017) dibanding RNN/LSTM?", "code": null, "options": ["Memproses semua kata sekaligus (paralel) lewat attention, bukan satu per satu", "Tidak butuh data pelatihan", "Hanya bisa bahasa Inggris", "Mengubah kata menjadi gambar"], "answer": 0, "explanation": "RNN/LSTM membaca kata satu per satu (lambat, mudah lupa). Transformer membaca seluruh kalimat sekaligus lewat attention."}, {"q": "Mana pernyataan paling tepat tentang jumlah parameter LLM?", "code": null, "options": ["Parameter tidak berpengaruh sama sekali", "Makin sedikit parameter selalu makin baik", "Umumnya makin banyak parameter makin mampu, tapi kualitas data & arsitektur sama penting", "Parameter satu-satunya penentu kepintaran"], "answer": 2, "explanation": "Lebih banyak parameter membantu menangkap pola (sampai titik tertentu), tapi data berkualitas, arsitektur, dan fine-tuning sama pentingnya."}, {"q": "Apa itu tokenization?", "code": null, "options": ["Menerjemahkan teks ke bahasa Inggris", "Memecah teks jadi token (sering subword) lalu memetakan tiap token ke ID angka", "Mengubah teks menjadi gambar", "Menghapus semua kata yang jarang"], "answer": 1, "explanation": "Model membaca angka, bukan huruf. Tokenization memecah teks jadi token (potongan kata) dan memberi tiap token sebuah ID angka."}, {"q": "Apa fungsi embedding?", "code": null, "options": ["Mengubah tiap token jadi vektor angka, di mana makna mirip menghasilkan vektor mirip", "Mengurutkan token dari kecil ke besar", "Menghapus token duplikat", "Mengubah token kembali jadi huruf"], "answer": 0, "explanation": "Embedding mengubah token jadi deret angka (vektor). Kata bermakna mirip ('raja','ratu') punya vektor berdekatan — inilah cara model 'memahami' makna."}, {"q": "Dalam analogi diskusi kelompok untuk attention, apa peran Query (Q), Key (K), dan Value (V)?", "code": null, "options": ["Q,K,V semuanya sama, hanya cadangan", "Q=pertanyaan tiap kata, K=name-tag/label keahlian, V=isi informasi kata", "Q=jawaban akhir, K=nomor urut, V=warna", "Q=kecepatan, K=memori, V=suhu"], "answer": 1, "explanation": "Tiap kata mengajukan pertanyaan (Q), punya name-tag keahlian (K), dan isi informasi (V). Attention mencocokkan Q ke semua K lalu mengambil campuran berbobot dari V (lalu dirangkum lewat O)."}, {"q": "Apa arti LLM bersifat 'autoregressive' saat menghasilkan teks?", "code": null, "options": ["Menghasilkan seluruh kalimat sekaligus dalam satu langkah", "Memprediksi 1 token, token itu jadi input untuk token berikutnya, diulang terus", "Hanya bisa membaca, tidak bisa menulis", "Menebak dari kata terakhir ke kata pertama"], "answer": 1, "explanation": "LLM menulis token demi token: prediksi satu token, tambahkan ke input, prediksi berikutnya, begitu seterusnya."}, {"q": "Apa pengaruh parameter temperature pada generasi teks?", "code": null, "options": ["Rendah = output fokus/konsisten; tinggi = lebih kreatif/acak", "Rendah = acak; tinggi = fokus", "Mengatur jumlah parameter model", "Menentukan bahasa output"], "answer": 0, "explanation": "Temperature rendah membuat model memilih kata paling mungkin (fokus); tinggi memberi peluang kata lain (kreatif tapi bisa ngawur)."}, {"q": "Kenapa kita memakai apply_chat_template, bukan menyusun string 'User: ...' sendiri?", "code": "messages = [{\"role\":\"system\",\"content\":\"Kamu asisten\"},\n            {\"role\":\"user\",\"content\":\"Halo\"}]\ninputs = tok.apply_chat_template(messages,\n    add_generation_prompt=True, return_dict=True)", "options": ["Agar model menjadi lebih kecil", "Agar tidak perlu GPU", "Karena model chat dilatih dengan format khusus (ChatML); template menyusun peran system/user persis seperti saat dilatih", "Karena string manual dilarang Python"], "answer": 2, "explanation": "Model instruct dilatih dengan format token khusus (ChatML: <|im_start|>). apply_chat_template menyusun pesan persis format itu (termasuk system prompt) — hasilnya jauh lebih baik daripada string mentah."}, {"q": "Saat quantization 4-bit di Colab T4, kenapa bnb_4bit_compute_dtype harus torch.float16?", "code": "BitsAndBytesConfig(\n    load_in_4bit=True,\n    bnb_4bit_quant_type=\"nf4\",\n    bnb_4bit_compute_dtype=torch.float16)", "options": ["Karena float16 paling akurat dari semua tipe", "Karena T4 (compute 7.5) tak mendukung bfloat16 — bfloat16 akan crash; float16 aman", "Karena float16 membuat model lebih besar", "Bebas, tipe apa saja sama saja"], "answer": 1, "explanation": "GPU T4 (compute capability 7.5) tidak mendukung bfloat16. Menyetel compute_dtype=bfloat16 menyebabkan error; gunakan float16."}, {"q": "Kenapa model 7B perlu quantization 4-bit agar muat di T4 16GB?", "code": null, "options": ["Karena 4-bit membuat model lebih pintar", "Karena T4 hanya bisa 4-bit", "Bobot 7B fp16 ~14 GB (+overhead → OOM); dalam 4-bit hanya ~5,5 GB sehingga muat", "Karena 4-bit mempercepat internet"], "answer": 2, "explanation": "7B × 2 byte (fp16) ≈ 14 GB bobot, plus aktivasi → melebihi 16 GB (OOM). NF4 4-bit menyusutkan bobot jadi ~4–5,5 GB sehingga muat nyaman."}, {"q": "Apa inti dari metode LoRA?", "code": null, "options": ["Melatih ulang seluruh parameter dari nol", "Membekukan model raksasa, lalu menambah & melatih matriks 'adapter' kecil (sekitar 1% parameter)", "Menghapus separuh layer model", "Mengubah model jadi gambar"], "answer": 1, "explanation": "Analogi sticky-note: daripada menulis ulang seluruh 'buku' (semua bobot), LoRA membekukan model dan hanya melatih adapter kecil (~1%) — jauh lebih murah & cepat."}, {"q": "Apa yang ditambahkan QLoRA dibanding LoRA biasa?", "code": null, "options": ["Tidak ada bedanya", "QLoRA melatih semua parameter", "Model dasar di-quantize ke 4-bit dulu, baru ditambah adapter LoRA — sehingga model besar muat di GPU kecil", "QLoRA hanya untuk gambar"], "answer": 2, "explanation": "Analogi: kecilkan dulu buku jadi edisi saku 4-bit, baru tempel sticky-note. QLoRA = base 4-bit + adapter LoRA → bisa fine-tune model lebih besar di T4."}, {"q": "Apa gunanya model.disable_adapter() pada kode di atas?", "code": "with model.disable_adapter():\n    jawaban_base = ask(model, pertanyaan)\njawaban_ft = ask(model, pertanyaan)", "options": ["Menghapus model dari memori", "Mematikan adapter LoRA sementara → kita dapat jawaban BASE vs FINE-TUNED dari satu model yang sama", "Mempercepat training", "Mengubah bahasa jawaban"], "answer": 1, "explanation": "disable_adapter mematikan adapter sementara (= perilaku base). Dengan begitu kita membandingkan base vs fine-tuned tanpa memuat dua model terpisah."}, {"q": "Apa yang diukur metrik ROUGE, BLEU, dan BERTScore?", "code": null, "options": ["Kecepatan GPU saat inferensi", "Jumlah parameter model", "Suhu GPU saat training", "Seberapa dekat output model dengan teks referensi — kemiripan kata atau makna"], "answer": 3, "explanation": "Ketiganya membandingkan output dengan referensi: ROUGE/BLEU melihat tumpang-tindih kata (n-gram), BERTScore melihat kemiripan makna lewat embedding."}, {"q": "Kenapa uji signifikansi (mis. p < 0,05) penting saat membandingkan dua model?", "code": null, "options": ["Untuk memastikan selisih skor benar-benar nyata, bukan kebetulan karena sampel sedikit", "Agar model otomatis lebih cepat", "Untuk menambah parameter model", "Untuk mengganti bahasa output"], "answer": 0, "explanation": "Skor B bisa terlihat lebih tinggi hanya karena kebetulan pada sedikit data. p < 0,05 menandakan selisih cukup kuat untuk disebut nyata. Catatan: LLM-as-judge bisa bias 'self-preference' (memuji output dari keluarganya sendiri)."}]};
window.QUIZ = QUIZ;
const LAB = ["A","B","C","D"];
let answered = 0, correct = 0;
const total = QUIZ.questions.length;
const quizEl = document.getElementById("quiz");

QUIZ.questions.forEach((item, qi) => {
  const card = document.createElement("div"); card.className = "q";
  const num = document.createElement("div"); num.className = "num"; num.textContent = "Soal " + (qi+1);
  card.appendChild(num);
  const text = document.createElement("div"); text.className = "text"; text.textContent = item.q;
  card.appendChild(text);
  if (item.code) { const pre = document.createElement("pre"); pre.textContent = item.code; card.appendChild(pre); }
  const expl = document.createElement("div"); expl.className = "expl";
  item.options.forEach((opt, oi) => {
    const b = document.createElement("button"); b.className = "opt";
    const lab = document.createElement("span"); lab.className = "lab"; lab.textContent = LAB[oi] + ".";
    b.appendChild(lab); b.appendChild(document.createTextNode(" " + opt));
    b.onclick = () => {
      if (card.dataset.locked) return;
      card.dataset.locked = "1";
      const opts = card.querySelectorAll(".opt");
      opts.forEach(o => o.classList.add("locked"));
      opts[item.answer].classList.add("correct");
      if (oi === item.answer) { correct++; }
      else { b.classList.add("wrong"); }
      answered++;
      document.getElementById("answered").textContent = answered;
      document.getElementById("correct").textContent = correct;
      expl.classList.add("show");
      if (answered === total) showSummary();
    };
    card.appendChild(b);
  });
  const eb = document.createElement("b"); eb.textContent = "Penjelasan: ";
  expl.appendChild(eb); expl.appendChild(document.createTextNode(item.explanation));
  card.appendChild(expl);
  quizEl.appendChild(card);
});

function showSummary(){
  const pct = Math.round(correct/total*100);
  const s = document.getElementById("summary"); s.classList.add("show");
  document.getElementById("finalscore").textContent = "Skor: " + correct + " / " + total + " (" + pct + "%)";
  let msg = pct>=80 ? "Hebat! Pemahaman kamu solid." : pct>=60 ? "Lumayan — ulas lagi materi yang masih salah." : "Ayo pelajari lagi modulnya, lalu coba ulangi.";
  document.getElementById("finalmsg").textContent = msg;
  s.scrollIntoView({behavior:"smooth"});
}
</script></body></html>
