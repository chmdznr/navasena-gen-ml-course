<!doctype html><html lang="id"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NVIDIA Ecosystem — Quiz</title>
<style>
:root{--bg:#1A1A2E;--card:#2D2D44;--green:#76B900;--lgreen:#A3D944;--white:#fff;
--gray:#AAAACC;--red:#EF5350;--dark:#23233A;}
*{box-sizing:border-box;}
body{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
margin:0;background:var(--bg);color:var(--white);line-height:1.45;}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 60px;}
header{background:linear-gradient(135deg,var(--green),#5a8c00);border-radius:12px;
padding:16px 20px;margin-bottom:14px;}
header .mod{font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:.9;}
header h1{margin:2px 0 0;font-size:24px;}
header p{margin:4px 0 0;font-size:13px;opacity:.95;}
.scorebar{position:sticky;top:0;z-index:5;background:var(--dark);border:1px solid var(--card);
border-radius:10px;padding:8px 14px;margin-bottom:14px;display:flex;justify-content:space-between;
align-items:center;font-size:13px;}
.scorebar b{color:var(--lgreen);}
.q{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:12px;
border-left:4px solid var(--green);}
.q .num{color:var(--green);font-weight:700;font-size:12px;}
.q .text{font-size:15px;font-weight:600;margin:4px 0 8px;}
.q pre{background:var(--bg);color:var(--lgreen);font-family:"SF Mono",Menlo,Consolas,monospace;
font-size:12.5px;padding:9px 11px;border-radius:6px;overflow-x:auto;margin:0 0 9px;}
.opt{display:block;width:100%;text-align:left;background:var(--dark);color:var(--white);
border:1.5px solid #3a3a55;border-radius:8px;padding:9px 12px;margin:6px 0;font-size:14px;
cursor:pointer;transition:.12s;}
.opt:hover:not(.locked){border-color:var(--green);}
.opt .lab{display:inline-block;width:20px;font-weight:700;color:var(--gray);}
.opt.correct{background:rgba(118,185,0,.18);border-color:var(--green);}
.opt.correct .lab{color:var(--green);}
.opt.wrong{background:rgba(239,83,80,.16);border-color:var(--red);}
.opt.wrong .lab{color:var(--red);}
.opt.locked{cursor:default;}
.expl{display:none;font-size:13px;color:var(--gray);background:var(--bg);
border-radius:6px;padding:8px 11px;margin-top:8px;border-left:3px solid var(--lgreen);}
.expl.show{display:block;}
.expl b{color:var(--lgreen);}
.summary{display:none;background:var(--card);border-radius:12px;padding:20px;text-align:center;
margin-top:8px;border:2px solid var(--green);}
.summary.show{display:block;}
.summary .big{font-size:34px;font-weight:800;color:var(--green);}
.summary .msg{font-size:15px;color:var(--gray);margin:6px 0 14px;}
.btn{background:var(--green);color:#0d0d0d;border:none;border-radius:8px;padding:10px 22px;
font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{background:var(--lgreen);}
footer{text-align:center;color:var(--gray);font-size:11px;margin-top:18px;opacity:.7;}
</style></head>
<body><div class="wrap">
<header><div class="mod">Module 06 · Quiz Latihan</div><h1>NVIDIA Ecosystem</h1>
<p>12 soal pilihan ganda · gaya sertifikasi · pilih satu jawaban</p></header>
<div class="scorebar"><span>Terjawab: <b id="answered">0</b> / 12</span>
<span>Benar: <b id="correct">0</b></span></div>
<div id="quiz"></div>
<div class="summary" id="summary"><div class="big" id="finalscore"></div>
<div class="msg" id="finalmsg"></div><button class="btn" onclick="location.reload()">Ulangi Quiz</button></div>
<footer>Navasena Gen-ML Course · Module 06 NVIDIA Ecosystem — Quiz</footer>
</div>
<script>
const QUIZ = {"module": "06", "title": "NVIDIA Ecosystem", "questions": [{"q": "Pada stack NVIDIA, apa peran CUDA?", "code": null, "options": ["Library matematika siap pakai seperti cuDNN dan cuBLAS", "Jembatan agar GPU bisa dipakai untuk komputasi umum", "Framework tempat kita menulis kode model seperti PyTorch", "Hardware fisik berupa chip GPU seperti T4 atau A100"], "answer": 1, "explanation": "Di slide stack NVIDIA, CUDA didefinisikan sebagai jembatan agar GPU bisa untuk komputasi umum; library, framework, dan hardware adalah lapisan yang berbeda."}, {"q": "Mengapa GPU lebih cocok untuk deep learning dibanding CPU?", "code": null, "options": ["GPU punya sedikit core yang sangat pintar untuk kerja berurutan", "GPU punya ribuan core sederhana yang bekerja paralel, cocok untuk operasi matriks", "GPU menyimpan model dalam FP32 sehingga akurasinya lebih tinggi", "GPU menjalankan kode Python lebih cepat daripada CPU"], "answer": 1, "explanation": "Slide menjelaskan GPU punya ribuan core sederhana yang bekerja paralel, sementara deep learning adalah tumpukan matrix operations yang bisa dipecah jadi ribuan operasi kecil."}, {"q": "Pada kode load model phi-2 di bawah, apa fungsi torch_dtype=torch.float16?", "code": "model = AutoModelForCausalLM.from_pretrained(\n    \"microsoft/phi-2\",\n    torch_dtype=torch.float16,\n    device_map=\"auto\")", "options": ["Memuat model dalam FP16 agar hemat memori GPU", "Menyalakan mixed precision training dengan AMP/autocast", "Menempatkan model otomatis ke GPU yang tersedia", "Mengkuantisasi model ke INT8 untuk inference"], "answer": 0, "explanation": "torch_dtype=torch.float16 memuat model dalam FP16 penuh untuk hemat memori; penempatan ke GPU diatur oleh device_map=\"auto\", dan ini bukan mixed precision (tanpa AMP)."}, {"q": "Apa keunggulan FP16 dibanding FP32 menurut slide half precision?", "code": null, "options": ["Presisi lebih tinggi dengan memori yang sama", "Hemat memori sekitar 50% dan cepat di Tensor Cores", "Selalu meningkatkan akurasi model", "Menggandakan jumlah core GPU yang aktif"], "answer": 1, "explanation": "Tabel slide menyebut FP16 (16-bit) hemat memori ~50% dan cepat di Tensor Cores, sementara FP32 presisi penuh tapi boros memori."}, {"q": "Manakah pernyataan yang BENAR tentang TensorRT di Module 06?", "code": null, "options": ["TensorRT didemokan langsung untuk mempercepat phi-2 di notebook", "TensorRT mempercepat training model dari nol", "TensorRT hanya di-install dan dibahas konseptual, tanpa demo", "TensorRT menggantikan PyTorch sebagai framework utama notebook"], "answer": 2, "explanation": "Slide menegaskan TensorRT di Module 06 hanya di-install dan dibahas konseptual; tidak ada demo karena notebook memakai PyTorch."}, {"q": "Teknik apa yang dipakai TensorRT untuk mempercepat inference?", "code": null, "options": ["Layer fusion, kernel auto-tuning, dan precision calibration", "Backpropagation dan gradient descent paralel", "Data augmentation dan dropout otomatis", "Sharding model ke banyak GPU saat training"], "answer": 0, "explanation": "Slide TensorRT menyebut layer fusion, kernel auto-tuning, dan precision calibration (turun ke FP16/INT8) sebagai cara mempercepat inference."}, {"q": "Apa karakteristik utama NVIDIA NeMo menurut slide?", "code": null, "options": ["Library closed-source khusus computer vision", "Toolkit open-source untuk conversational AI dengan banyak pre-trained model", "Framework training dari nol tanpa model siap pakai", "Driver GPU untuk mengaktifkan Tensor Cores"], "answer": 1, "explanation": "NeMo dijelaskan sebagai toolkit open-source NVIDIA untuk conversational AI, kaya pre-trained model siap pakai, modular, dan skalabel di GPU."}, {"q": "Untuk task NER, model NeMo apa yang dipakai?", "code": "model = TokenClassificationModel \\\n    .from_pretrained(\"ner_en_bert\")\nresults = model.add_predictions(texts)", "options": ["QAModel dengan qa_squadv1.1_bertbase", "TokenClassificationModel dengan ner_en_bert berbasis BERT", "MTEncDecModel dengan nmt_en_zh_transformer24x6", "PunctuationCapitalizationModel dengan punctuation_en_bert"], "answer": 1, "explanation": "Slide NER & QA menyebut NER memakai TokenClassificationModel + ner_en_bert (berbasis BERT) dengan add_predictions() untuk menandai entitas seperti ORG dan LOC."}, {"q": "Bagaimana pipeline TTS di NeMo bekerja menurut slide?", "code": "parsed = spec_gen.parse(text)\nspec = spec_gen.generate_spectrogram(tokens=parsed)\naudio = vocoder.convert_spectrogram_to_audio(spec=spec)", "options": ["Satu tahap: teks langsung jadi audio oleh HiFiGAN", "Dua tahap: FastPitch teks ke spectrogram, lalu HiFiGAN spectrogram ke audio", "Dua tahap: HiFiGAN teks ke spectrogram, lalu FastPitch ke audio", "Tiga tahap: parse, translate, lalu vocoder"], "answer": 1, "explanation": "Slide menjelaskan TTS adalah pipeline 2 tahap: FastPitch mengubah teks jadi spectrogram, lalu HiFiGAN (vocoder) mengubah spectrogram jadi audio."}, {"q": "Tentang model ASR dan MegatronGPTModel di notebook NeMo, mana yang benar?", "code": null, "options": ["Keduanya didemonstrasikan penuh sebagai contoh utama", "Keduanya di-import tetapi TIDAK didemonstrasikan", "ASR didemokan, Megatron tidak di-import sama sekali", "Keduanya hanya disebut di slide, tidak ada di kode"], "answer": 1, "explanation": "Slide Catatan Penting menekankan ASR dan MegatronGPTModel di-import tetapi tidak didemonstrasikan; import bukan berarti dipakai."}, {"q": "Pada NvidiaRAGSystem, komponen apa yang dipakai sebagai LLM generator dan index?", "code": "self.llm = AutoModelForCausalLM \\\n    .from_pretrained(\"gpt2\").to(self.device)", "options": ["TinyLlama sebagai LLM dan FAISS IndexFlatL2 sebagai index", "gpt2 sebagai LLM dan FAISS IndexFlatL2 sebagai index", "MegatronGPTModel sebagai LLM dan ChromaDB sebagai index", "gpt2 sebagai LLM dan IndexIVFFlat sebagai index"], "answer": 1, "explanation": "Slide arsitektur NvidiaRAGSystem menyebut generator memakai LLM gpt2 di GPU dan index memakai FAISS IndexFlatL2; TinyLlama adalah LLM Module 05, bukan 06."}, {"q": "Manakah catatan akurasi yang BENAR tentang RAG di Module 06?", "code": null, "options": ["faiss-gpu di-install tetapi IndexFlatL2 sebenarnya dibangun di CPU", "MegatronGPTModel adalah LLM yang benar-benar dipakai menjawab", "FAISS index dibangun sepenuhnya di GPU memakai faiss-gpu", "Embedding dan LLM dijalankan di CPU, hanya FAISS di GPU"], "answer": 0, "explanation": "Slide Alur Demo & Catatan menegaskan faiss-gpu di-install tapi IndexFlatL2 sebenarnya dibangun di CPU, dan MegatronGPTModel hanya di-import sementara LLM yang dipakai adalah gpt2."}]};
window.QUIZ = QUIZ;
const LAB = ["A","B","C","D"];
let answered = 0, correct = 0;
const total = QUIZ.questions.length;
const quizEl = document.getElementById("quiz");

QUIZ.questions.forEach((item, qi) => {
  const card = document.createElement("div"); card.className = "q";
  const num = document.createElement("div"); num.className = "num"; num.textContent = "Soal " + (qi+1);
  card.appendChild(num);
  const text = document.createElement("div"); text.className = "text"; text.textContent = item.q;
  card.appendChild(text);
  if (item.code) { const pre = document.createElement("pre"); pre.textContent = item.code; card.appendChild(pre); }
  const expl = document.createElement("div"); expl.className = "expl";
  item.options.forEach((opt, oi) => {
    const b = document.createElement("button"); b.className = "opt";
    const lab = document.createElement("span"); lab.className = "lab"; lab.textContent = LAB[oi] + ".";
    b.appendChild(lab); b.appendChild(document.createTextNode(" " + opt));
    b.onclick = () => {
      if (card.dataset.locked) return;
      card.dataset.locked = "1";
      const opts = card.querySelectorAll(".opt");
      opts.forEach(o => o.classList.add("locked"));
      opts[item.answer].classList.add("correct");
      if (oi === item.answer) { correct++; }
      else { b.classList.add("wrong"); }
      answered++;
      document.getElementById("answered").textContent = answered;
      document.getElementById("correct").textContent = correct;
      expl.classList.add("show");
      if (answered === total) showSummary();
    };
    card.appendChild(b);
  });
  const eb = document.createElement("b"); eb.textContent = "Penjelasan: ";
  expl.appendChild(eb); expl.appendChild(document.createTextNode(item.explanation));
  card.appendChild(expl);
  quizEl.appendChild(card);
});

function showSummary(){
  const pct = Math.round(correct/total*100);
  const s = document.getElementById("summary"); s.classList.add("show");
  document.getElementById("finalscore").textContent = "Skor: " + correct + " / " + total + " (" + pct + "%)";
  let msg = pct>=80 ? "Hebat! Pemahaman kamu solid." : pct>=60 ? "Lumayan — ulas lagi materi yang masih salah." : "Ayo pelajari lagi modulnya, lalu coba ulangi.";
  document.getElementById("finalmsg").textContent = msg;
  s.scrollIntoView({behavior:"smooth"});
}
</script></body></html>
