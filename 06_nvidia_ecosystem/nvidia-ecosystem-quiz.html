<script>
const QUIZ = {"module": "06", "title": "NVIDIA Ecosystem", "questions": [{"q": "Kenapa GPU jauh lebih cepat daripada CPU untuk inferensi LLM?", "code": null, "options": ["GPU punya clock per-core yang jauh lebih tinggi daripada CPU", "Inti LLM adalah perkalian matriks yang sangat paralel, dan GPU punya ribuan core untuk mengerjakannya serentak", "GPU menyimpan seluruh model di cache L1 sehingga tak perlu RAM", "CPU tidak bisa menjalankan operasi floating-point sama sekali"], "answer": 1, "explanation": "Inti tiap layer transformer adalah perkalian matriks (matmul) yang 'embarrassingly parallel': tiap elemen hasil dihitung independen. GPU punya ribuan core sederhana yang mengerjakannya serentak, sementara CPU hanya punya belasan core."}, {"q": "Apa fungsi Tensor Core pada GPU NVIDIA, dan apa syaratnya menyala?", "code": null, "options": ["Unit hardware khusus matmul yang hanya aktif pada precision rendah seperti FP16/FP8, bukan FP32", "Cache khusus yang mempercepat akses memori untuk semua precision", "Core yang hanya dipakai saat training, tidak untuk inference", "Unit yang menambah jumlah CUDA core secara dinamis"], "answer": 0, "explanation": "Tensor Core mengerjakan perkalian-akumulasi matriks kecil langsung di silikon, tetapi hanya untuk data precision rendah (FP16/BF16/FP8/INT8). FP32 jalan di CUDA core biasa. Maka FP16 bukan sekadar hemat memori — ia menyalakan Tensor Core."}, {"q": "Dari benchmark T4: memori bobot FP32 6.18 GB vs FP16 3.10 GB. Apa kesimpulannya?", "code": null, "options": ["FP16 separuh memori (2.0x lebih hemat) karena 16 bit = separuh dari 32 bit", "FP16 boros memori karena butuh konversi tambahan", "FP32 dan FP16 memakai memori yang sama, bedanya hanya kecepatan", "FP16 hanya hemat saat model di bawah 1 miliar parameter"], "answer": 0, "explanation": "16 bit adalah separuh dari 32 bit, jadi memori bobot turun 2.0x (6.18 -> 3.10 GB) persis sesuai teori. FP16 adalah default deploy paling aman: kualitas hampir identik FP32, tapi separuh memori dan jauh lebih cepat."}, {"q": "Apa beda quantization 4-bit untuk inference (nb01) dengan QLoRA di Modul 04?", "code": null, "options": ["QLoRA memakai 8-bit, sedangkan inference quant memakai 4-bit", "Tidak ada beda; keduanya istilah yang sama persis", "Inference quant murni kompresi bobot untuk deploy (tanpa training/adapter); QLoRA meng-quantize agar bisa melatih adapter LoRA (mengubah perilaku)", "Inference quant melatih ulang seluruh model, QLoRA tidak"], "answer": 2, "explanation": "Konfigurasi quantization-nya mirip, tapi niatnya beda. QLoRA (M04): quantize agar muat, lalu latih adapter LoRA untuk MENGUBAH perilaku (training). nb01: model sudah jadi, kita hanya ingin MENJALANKANNYA dengan memori lebih kecil (inference) — tanpa training, tanpa adapter."}, {"q": "Apa beda mendasar TensorRT dengan TensorRT-LLM?", "code": null, "options": ["TensorRT-LLM hanya jalan di CPU, TensorRT hanya di GPU", "TensorRT adalah versi lama yang sudah ditinggalkan TensorRT-LLM", "Keduanya identik, hanya beda nama dagang", "TensorRT = compiler inference umum (CNN/ViT dll); TensorRT-LLM = khusus LLM dengan paged KV-cache & in-flight batching"], "answer": 3, "explanation": "TensorRT mengoptimalkan model apa pun lewat fusion + kalibrasi precision + auto-tuning kernel. TensorRT-LLM adalah cabang khusus LLM yang menambah paged KV-cache, in-flight (continuous) batching, dan FP8/INT4 — fitur yang dibutuhkan generasi token autoregresif."}, {"q": "Apa beda 'menjalankan model' dan 'menyajikan (serving) model'?", "code": null, "options": ["Menjalankan = di GPU, menyajikan = di CPU", "Menjalankan = satu prompt satu jawaban untuk satu pemakai; menyajikan = melayani banyak pengguna konkuren dengan batching, scaling, API standar", "Menyajikan selalu lebih lambat dan tidak dipakai di produksi", "Keduanya sama; 'serving' hanya istilah pemasaran"], "answer": 1, "explanation": "model.generate(...) menjalankan model: satu prompt, satu jawaban, satu pemakai. Serving menambahkan lapisan yang melayani ratusan pengguna konkuren — antre & gabung request (batching), skala replika, satu API standar, observability — supaya GPU mahal tidak menganggur."}, {"q": "Apa konsep 'dynamic batching' di Triton Inference Server?", "code": null, "options": ["Menjalankan beberapa model berbeda secara bergiliran", "Membagi satu request besar menjadi banyak request kecil", "Server menunggu sepersekian detik untuk mengumpulkan beberapa request lalu memprosesnya sekaligus, sehingga GPU terisi penuh dan throughput naik", "Mengubah ukuran batch training secara otomatis saat fine-tuning"], "answer": 2, "explanation": "Bagai kasir yang menunggu sebentar mengumpulkan pesanan lalu memproses sekaligus: memproses 8 request bersama hampir secepat memproses 1 di GPU. Hasilnya throughput melonjak dengan tambahan latency kecil. config.pbtxt mengatur tuas berapa lama server menunggu sebelum membentuk batch."}, {"q": "Bagaimana posisi Triton dan Dynamo dalam tangga serving NVIDIA?", "code": null, "options": ["Triton = baseline serving (diuji sertifikasi); Dynamo = penerus fokus LLM datacenter, flagship GTC 2025", "Dynamo = baseline lama; Triton = penerus terbaru", "Keduanya hanya untuk training, bukan serving", "Triton untuk gambar, Dynamo untuk teks — keduanya tak berkaitan"], "answer": 0, "explanation": "Triton adalah baseline serving yang diuji di sertifikasi (dynamic batching, multi-framework, metrics). Dynamo adalah penerusnya yang diumumkan di GTC 2025 — sering disebut 'Dynamo-Triton' — berfokus pada LLM skala datacenter (disaggregated serving, KV-cache aware routing, multi-node)."}, {"q": "Apa keistimewaan NVIDIA NIM sebagai cara men-deploy model?", "code": null, "options": ["NIM hanya bisa jalan di Google Colab", "NIM mewajibkan kita menulis config.pbtxt dan mem-build engine sendiri", "NIM adalah format model baru yang menggantikan ONNX", "Model sudah dibungkus optimasi+serving (TensorRT-LLM di dalam) dan disajikan sebagai microservice berprotokol OpenAI /v1 — kita cukup memanggilnya"], "answer": 3, "explanation": "NIM (NVIDIA Inference Microservices) membungkus seluruh tumpukan optimasi + serving menjadi layanan yang berbicara protokol OpenAI /v1. Kita tidak mem-build engine, tidak menulis config.pbtxt, tidak mengurus container — cukup memanggilnya seperti memanggil OpenAI."}, {"q": "Streaming jawaban (stream=True) paling tepat dipahami sebagai apa?", "code": null, "options": ["Trik kompresi yang memperkecil ukuran jawaban", "Fitur lapisan serving (bukan fitur model): server meneruskan token begitu dihasilkan, memangkas time-to-first-token", "Fitur internal model yang hanya ada di Nemotron", "Mode yang membuat jawaban lebih akurat"], "answer": 1, "explanation": "Model selalu menghasilkan token satu per satu (autoregresif). Server memilih menahannya sampai lengkap (stream=False) atau meneruskannya seketika (stream=True) — itulah 'efek mengetik'. Ini bagian kontrak OpenAI /v1, jadi kodenya identik lintas backend (NIM, vLLM, Ollama)."}, {"q": "Lima pilar Trustworthy AI versi NVIDIA mencakup yang mana?", "code": null, "options": ["Speed, Accuracy, Cost, Latency, Scale", "Fairness, Transparency, Accountability, Safety, Privacy", "Training, Tuning, Testing, Tracing, Tagging", "Tokenization, Embedding, Retrieval, Ranking, Generation"], "answer": 1, "explanation": "Lima pilar: Nondiscrimination/Fairness, Transparency, Accountability, Safety, dan Privacy & Security. nb03 mengerjakan tiga pertama (audit offline); nb04 mengerjakan Safety & Privacy (rail runtime)."}, {"q": "Mengapa fairness diaudit 'offline', bukan sebagai rail runtime per pesan?", "code": null, "options": ["Karena audit offline lebih murah daripada apa pun", "Karena regulator melarang audit runtime", "Karena fairness diuji pada ribuan keputusan sekaligus dengan data historis di meja audit, bukan pada satu permintaan saat tombol kirim ditekan", "Karena model tidak bisa diukur saat sedang berjalan"], "answer": 2, "explanation": "Fairness, Transparency, dan Accountability adalah pekerjaan audit offline: diukur pada dataset historis sebelum sistem dipercaya, lalu diulang berkala. Tidak ada 'rail fairness' yang menyala tiap permintaan — bias hanya tampak pada agregat ribuan keputusan, bukan satu per satu. Safety & Privacy-lah yang jadi rail runtime."}, {"q": "Kenapa akurasi total yang tinggi tidak menjamin model itu adil?", "code": null, "options": ["Karena akurasi selalu salah dihitung pada dataset kecil", "Karena akurasi total hanya berlaku untuk data numerik", "Akurasi selalu berbanding terbalik dengan fairness", "Akurasi menjumlahkan semua kelompok jadi satu angka, sehingga bisa menyembunyikan model yang hampir selalu salah pada satu kelompok"], "answer": 3, "explanation": "Model bisa berakurasi 88-92% total dan tetap diam-diam tidak adil: salahnya menumpuk di satu kelompok. Akurasi total menyembunyikannya karena menjumlahkan semua kelompok; fairness metrics membongkarnya dengan memecah per kelompok."}, {"q": "Apa beda demographic parity dan equalized odds, dan kenapa equalized odds lebih ketat?", "code": null, "options": ["Keduanya sama; equalized odds hanya nama lain demographic parity", "Demographic parity bersyarat pada kebenaran, equalized odds tidak", "Demographic parity = apakah tingkat persetujuan sama antar kelompok (disparitas < 0.1 = cukup adil); equalized odds menuntut keadilan bersyarat kebenaran (gap TPR/FPR pada yang sama-sama layak), jadi lebih sulit ditipu", "Equalized odds mengabaikan label kebenaran sepenuhnya"], "answer": 2, "explanation": "Demographic parity membandingkan tingkat hasil positif antar kelompok (mis. P(setuju|Pria) vs P(setuju|Wanita)); ambang ajar disparitas < 0.1 = cukup adil. Tapi ia bisa ditipu dengan menyetujui orang tidak layak demi menyamakan angka. Equalized odds lebih ketat: di antara yang sama-sama layak (TPR) dan sama-sama tidak layak (FPR), peluangnya harus sama antar kelompok."}, {"q": "Kapan memakai fairness metrics deterministik vs LLM-judge untuk mendeteksi ketidakadilan?", "code": null, "options": ["Selalu pakai LLM-judge karena lebih modern", "Metrik deterministik untuk keputusan terstruktur berisiko tinggi (kredit, rekrutmen); LLM-judge untuk teks bebas skala besar — perlakukan keluarannya sebagai sinyal, bukan vonis", "Selalu pakai metrik deterministik; LLM-judge tidak pernah berguna", "Keduanya wajib dipakai bersamaan pada setiap kasus tanpa kecuali"], "answer": 1, "explanation": "Metrik deterministik (numpy): input sama -> angka sama, bisa dipertanggungjawabkan di hadapan auditor, nol biaya — cocok untuk keputusan terstruktur berisiko tinggi. LLM-judge: fleksibel untuk teks bebas tak terstruktur, tapi probabilistik & bisa keliru — perlakukan sebagai sinyal dan validasi dengan tinjauan manusia."}, {"q": "Apa fungsi 'Model Card' sebagai artefak tata kelola?", "code": null, "options": ["Sertifikat lisensi komersial untuk menjual model", "File konfigurasi yang mempercepat inferensi model", "Kunci API yang dibutuhkan untuk memanggil model", "'Label gizi' model: apa modelnya, data apa yang dipakai, untuk apa ia dimaksudkan, dan apa batasannya — memenuhi pilar Transparency"], "answer": 3, "explanation": "Model Card adalah dokumen transparansi (dipopulerkan Google, kini standar de facto di Hugging Face) yang menjelaskan model, datanya, tujuan penggunaan, dan terutama BATASANNYA. Pasangannya, AI Ethics Checklist (ditandatangani sebelum rilis), memenuhi pilar Accountability."}, {"q": "Apa itu NemoGuard, dan bagaimana ia disajikan?", "code": null, "options": ["Sebuah library Python yang di-install lokal untuk memfilter kata", "Model khusus penjaga yang dilatih NVIDIA, disajikan sebagai NIM di endpoint yang sama dengan generator — satu API key, satu base_url, beda model=", "Sebuah firewall jaringan untuk melindungi server GPU", "Fitur bawaan tiap LLM yang aktif secara otomatis"], "answer": 1, "explanation": "NVIDIA tidak menyuruh kita menulis filter keamanan dengan tumpukan if. Mereka melatih model khusus penjaga (NemoGuard) dan menyajikannya sebagai NIM di endpoint yang sama persis dengan generator: satu NVIDIA_API_KEY, satu base_url, cukup ganti argumen model=."}, {"q": "Model content-safety (nvidia/llama-3.1-nemoguard-8b-content-safety) bekerja berdasarkan apa?", "code": null, "options": ["Daftar kata terlarang statis yang dicocokkan persis", "Pencarian web untuk tiap pesan masuk", "Taksonomi Aegis berisi 23 kategori bahaya (S1..S23) — system prompt = kebijakan + daftar kategori, output JSON {'User Safety':'safe'/'unsafe', ...}", "Skor sentimen positif/negatif sederhana"], "answer": 2, "explanation": "Content Safety adalah classifier yang dilatih di atas Llama-3.1-8B mengikuti taksonomi Aegis: 23 kategori bahaya (S1..S23) seperti kekerasan, senjata, ujaran kebencian. System prompt-nya berisi kebijakan + daftar kategori; ia membaca percakapan (dibungkus penanda BEGIN/END CONVERSATION) dan mengembalikan JSON {'User Safety': ...}."}, {"q": "Pertanyaan apa yang dijawab 'topic control' (yang BERBEDA dari content safety)?", "code": null, "options": ["Apakah pesan ini ditulis dalam bahasa yang benar?", "Apakah pesan ini berbahaya?", "Apakah pesan ini terlalu panjang untuk diproses?", "Apakah pesan ini di dalam lingkup yang boleh dilayani asisten ini? (on-topic / off-topic)"], "answer": 3, "explanation": "Content safety menjawab 'apakah ini berbahaya?'. Topic control menjawab pertanyaan berbeda: 'apakah ini di dalam lingkup?'. Chatbot HR tak seharusnya memberi saran saham atau diagnosis penyakit — walau semua itu 'aman'. Model membaca definisi topik di system prompt (wajib diakhiri baris restriksi) lalu memvonis on-topic/off-topic."}, {"q": "Kenapa di tier gratis, jailbreak ditangani lewat 'self-check' classifier langsung (Nemotron-nano), bukan model nvidia/nemoguard-jailbreak-detect?", "code": null, "options": ["Karena nemoguard-jailbreak-detect tidak ada lagi", "Karena jailbreak-detect bukan model chat (Random Forest di endpoint /v1/classify), sehingga tak bisa dipanggil pola chat.completions; self-check LLM mengerjakan keputusan yang sama lewat jalur free-tier", "Karena self-check selalu 100% akurat", "Karena jailbreak tidak berbahaya sehingga tak perlu model serius"], "answer": 1, "explanation": "nvidia/nemoguard-jailbreak-detect bukan model chat — ia Random Forest di atas embedding 768-dim lewat endpoint khusus /v1/classify, tak bisa dipanggil dengan chat.completions. Maka kita pakai self-check: minta Nemotron-nano (non-reasoning) memvonis Yes/No — pola sama dengan content-safety, bisa jalan di free-tier dan transparan untuk belajar."}, {"q": "Mengapa Nemotron-3-nano perlu 'reasoning dimatikan' saat dipakai sebagai rail penjaga?", "code": null, "options": ["Karena reasoning membuat jawaban lebih lambat dikirim ke jaringan", "Karena reasoning hanya boleh untuk training", "Ia reasoning model: tanpa dimatikan ia mengeluarkan blok <think>...</think> yang mengotori output yang harus berupa satu kata seperti 'unsafe' / 'on-topic'", "Karena reasoning menghabiskan kuota GPU lokal"], "answer": 2, "explanation": "Nemotron-3-nano adalah reasoning model: secara default ia mengeluarkan blok <think>...</think> sebelum jawaban — boros token dan fatal untuk rail yang mengharap output satu kata (Yes/No, safe/unsafe, on-topic). Reasoning dimatikan lewat extra_body chat_template_kwargs.enable_thinking=False pada setiap panggilan."}, {"q": "Di NIM untuk Nemotron, cara yang BEKERJA untuk mematikan reasoning adalah?", "code": null, "options": ["Parameter request extra_body chat_template_kwargs.enable_thinking=False", "Menempel token /no_think di awal prompt", "Menyetel temperature=0", "Menambahkan kalimat 'jangan berpikir' di system prompt"], "answer": 0, "explanation": "Di endpoint NIM untuk model ini, token prompt /no_think DIABAIKAN. Satu-satunya cara yang bekerja adalah parameter request extra_body={'chat_template_kwargs': {'enable_thinking': False}} — mekanik paling NVIDIA-spesifik di modul ini, ditampilkan inline (bukan disembunyikan di helper)."}, {"q": "Mengapa PII masking memakai regex deterministik, bukan LLM?", "code": null, "options": ["Karena regex lebih pintar memahami konteks daripada LLM", "Karena LLM tidak bisa membaca angka sama sekali", "Karena regex bisa dilatih ulang, LLM tidak", "Karena kontrol kepatuhan butuh perilaku cepat, andal, dapat diprediksi — pola PII ([NIK]/[PHONE]/[ACCOUNT]) bisa dideteksi pasti tanpa biaya/halusinasi LLM"], "answer": 3, "explanation": "PII masking adalah kontrol kepatuhan, jadi harus deterministik: regex mengenali pola PII Indonesia dan menggantinya dengan placeholder [NIK]/[PHONE]/[ACCOUNT]. Urutan pola penting — NIK (16 digit) dicek sebelum rekening (10-15 digit) agar tak salah-klaim. Cepat, andal, tanpa biaya/halusinasi LLM."}, {"q": "Dua angka kunci UU PDP No. 27/2022 yang wajib diingat untuk sertifikasi adalah?", "code": null, "options": ["Notifikasi kebocoran <= 24 jam; denda <= 5% pendapatan", "Notifikasi kebocoran <= 30 hari; denda tetap Rp 1 miliar", "Notifikasi kebocoran <= 72 jam; denda administratif <= 2% pendapatan tahunan", "Notifikasi kebocoran <= 7 hari; denda <= 10% laba bersih"], "answer": 2, "explanation": "UU PDP No. 27/2022 (setara GDPR Indonesia): kebocoran data pribadi wajib dilaporkan ke otoritas & subjek data paling lambat 72 jam, dengan denda administratif hingga 2% pendapatan tahunan. Itu sebabnya PII masking bukan 'nice to have' melainkan kontrol kepatuhan."}, {"q": "Apa fungsi rail 'grounding' dan apa sifatnya yang berbeda dari rail lain?", "code": null, "options": ["Ia memblokir konten berbahaya seperti content-safety", "Ia mempercepat retrieval konteks RAG", "Ia mengenkripsi jawaban sebelum dikirim", "Ia menjaga kejujuran (anti-halusinasi): memastikan jawaban bersandar pada dokumen & tiap klaim bisa ditelusuri lewat sitasi [n] yang diverifikasi"], "answer": 3, "explanation": "Grounding tidak memblokir konten berbahaya — ia rail transparansi yang menjaga kejujuran: jawaban harus bersandar pada konteks sumber, tiap klaim ditandai sitasi [n]. Lalu diverifikasi: sitasi di luar konteks atau klaim tanpa sitasi = sinyal halusinasi -> ditolak/ditandai."}, {"q": "Pada capstone /ask, urutan rail yang benar dalam pipeline adalah?", "code": null, "options": ["Generate dulu, lalu baru cek semua rail di akhir", "Input rails (jailbreak -> content-safety -> topic-control) -> RAG generate (NIM) -> output rails (grounding -> content-safety jawaban -> PII masking)", "PII masking dulu, lalu generate, tanpa cek safety sama sekali", "Hanya satu rail content-safety di tengah pipeline"], "answer": 1, "explanation": "Tiap POST /ask mengalir: input rails (self-check jailbreak -> content-safety -> topic-control) menyaring SEBELUM menyentuh generator; lalu RAG retrieve + generate (NIM); lalu output rails (grounding -> content-safety pada jawaban -> PII masking). Fail fast: begitu satu input rail menolak, generator tak pernah dipanggil."}, {"q": "Pada layanan FastAPI /ask, apa peran validasi Pydantic?", "code": null, "options": ["Memvalidasi bentuk request: request tanpa field 'question' ditolak HTTP 422 sebelum menyentuh model — lapis pertahanan termurah", "Mempercepat inferensi model NIM", "Menyimpan jawaban ke database otomatis", "Menjalankan rail content-safety menggantikan NemoGuard"], "answer": 0, "explanation": "Pydantic mendefinisikan skema request. FastAPI memvalidasinya otomatis: request cacat (mis. tanpa 'question') ditolak HTTP 422 SEBELUM menyentuh model NIM mana pun. Validasi adalah lapis pertahanan termurah — menolak input rusak tanpa membayar satu panggilan API pun."}, {"q": "Untuk apa field 'rails' (jejak rail yang aktif) dikembalikan & disimpan tiap /ask?", "code": null, "options": ["Untuk mempercepat permintaan berikutnya", "Untuk menghitung tagihan API ke pengguna", "Jejak audit: bukti rail mana yang aktif/memblokir, disimpan ke log untuk pilar Accountability & Transparency (dan kepatuhan UU PDP)", "Untuk menyimpan jawaban agar bisa di-cache"], "answer": 2, "explanation": "Setiap rail yang aktif dicatat dan dikembalikan bersama jawaban ({answer, sources, rails, blocked}). Field rails inilah jejak audit — bukti rail mana yang aktif/memblokir — yang disimpan ke log untuk Accountability & Transparency, sejalan kewajiban audit UU PDP."}, {"q": "Bagaimana TestClient FastAPI dipakai menguji service tanpa menyalakan uvicorn?", "code": null, "options": ["Ia memanggil endpoint dalam proses (rail tetap benar-benar memanggil NIM), memverifikasi 200 grounded+cited, jailbreak/off-topic blocked, request cacat 422", "Ia hanya mengecek sintaks Python tanpa menjalankan rail apa pun", "Ia menjalankan server di port 8000 lalu menutupnya", "Ia mengganti NIM dengan jawaban palsu agar tak perlu API key"], "answer": 0, "explanation": "TestClient memanggil endpoint DALAM proses — tak perlu uvicorn berjalan — tetapi rail-nya benar-benar memanggil NIM. Empat skenario kunci diverifikasi: pertanyaan AI valid -> 200 grounded+bersitasi+blocked=False; jailbreak -> blocked=True; off-topic -> blocked=True; request tanpa question -> 422."}, {"q": "Kenapa di capstone, mengganti generator (mis. ke model spesialis M04 via Ollama) tidak menyentuh logika rail?", "code": null, "options": ["Karena rail ditulis ulang otomatis tiap ganti model", "Karena model spesialis kebetulan punya rail bawaan sendiri", "Karena rail hanya aktif untuk model NVIDIA", "Tema 'satu client, banyak backend': semua backend bicara kontrak OpenAI /v1, jadi ganti generator = ganti base_url + model; keenam rail tetap utuh"], "answer": 3, "explanation": "Karena semua backend (NIM hosted, Ollama lokal, engine TensorRT Jetson) berbicara kontrak OpenAI /v1 yang sama, mengganti generator hanya berarti mengganti base_url + model — tanpa menyentuh logika rail sama sekali. Keenam rail tetap utuh; yang berubah hanya tiga baris konfigurasi."}, {"q": "Apa pesan besar capstone tentang posisi Trustworthy AI dalam sistem AI?", "code": null, "options": ["Trustworthy AI cukup didokumentasikan di akhir, tak perlu dijalankan", "Trustworthy AI bukan fitur tambahan, melainkan lapisan runtime yang membungkus model dan keputusannya bisa diaudit", "Trustworthy AI hanya relevan untuk model di atas 70B parameter", "Trustworthy AI menggantikan kebutuhan akan serving dan optimasi"], "answer": 1, "explanation": "Capstone membuktikan 'AI yang bisa dipercaya' bukan fitur tambahan, melainkan lapisan runtime yang membungkus model — input rails + RAG + output rails — yang berjalan di SETIAP permintaan dan keputusannya (field rails) bisa diaudit. Inilah titik temu Software Development (deploy/serving) dan Trustworthy AI yang ditanyakan ujian."}, {"q": "Kenapa engine TensorRT untuk Jetson harus di-build di perangkat target, bukan di-build di Colab lalu disalin?", "code": null, "options": ["Karena Jetson tidak punya koneksi internet untuk mengunduh engine", "Karena lisensi NVIDIA melarang menyalin file engine antar mesin", "Karena engine meng-embed machine code + taktik untuk arsitektur GPU + versi TensorRT tertentu, sehingga engine dari GPU lain ditolak saat di-load", "Karena engine TensorRT hanya berjalan jika model di-train di mesin yang sama"], "answer": 2, "explanation": "Engine TensorRT bukan format portabel: ia meng-embed SASS (machine code) + pilihan taktik yang disetel untuk compute-capability GPU spesifik dan versi TensorRT spesifik. Engine yang dibangun di T4 (sm_75) akan ditolak saat di-load di Orin (sm_87). Maka build engine + inference selalu di perangkat target."}, {"q": "Dalam alur deploy TensorRT Edge-LLM, bagian mana yang PORTABEL (boleh dikerjakan di Colab/x86) dan mana yang terikat hardware?", "code": null, "options": ["Export checkpoint → ONNX portabel; build engine + inference terikat ke GPU target", "Semua tahap portabel asalkan versi Python sama", "Export ONNX terikat hardware; build engine portabel", "Tidak ada yang portabel; semua wajib di perangkat target"], "answer": 0, "explanation": "ONNX adalah graph + bobot, tak terikat hardware → export boleh di mana saja (di lab ini kita pakai venv torch-CPU di Orin, tapi Colab/x86 pun bisa). Build engine dan inference terikat ke arsitektur GPU + versi TensorRT, jadi wajib di perangkat target."}, {"q": "Benchmark di Orin Nano untuk spesialis 0.6B yang sama: TensorRT Edge-LLM 42.7 tok/dtk vs Ollama (GGUF) 40.4 tok/dtk. Kesimpulan rekayasa yang tepat?", "code": null, "options": ["TensorRT selalu lebih baik karena NVIDIA-native, jadi Ollama tak perlu dipertimbangkan", "Ollama 3x lebih cepat sehingga TensorRT tak pernah berguna", "Karena beda kecepatan besar, kerumitan setup TensorRT selalu sepadan", "Kecepatan praktis sama; untuk model kecil di edge Ollama menang (jauh lebih sederhana + webservice bawaan), sedangkan TensorRT Edge-LLM baru sepadan di skala produksi (model besar, integrasi C++, NVFP4/FP8)"], "answer": 3, "explanation": "Selisih 42.7 vs 40.4 ada dalam noise — praktis sama, output identik. Tapi Ollama = 1 perintah + OpenAI /v1 bawaan, sedangkan TensorRT Edge-LLM butuh ~1 jam + 6 gotcha + CLI saja. 'NVIDIA-native' tidak otomatis lebih baik: ukur dulu. TensorRT Edge-LLM menonjol di skala produksi (model besar, runtime C++ tanpa Python, NVFP4/FP8), bukan microbench model kecil."}]};
window.QUIZ = QUIZ;
const LAB = ["A","B","C","D"];
let answered = 0, correct = 0;
const total = QUIZ.questions.length;
const quizEl = document.getElementById("quiz");
QUIZ.questions.forEach((item, qi) => {
  const card = document.createElement("div"); card.className = "q";
  const num = document.createElement("div"); num.className = "num"; num.textContent = "Soal " + (qi+1);
  card.appendChild(num);
  const text = document.createElement("div"); text.className = "text"; text.textContent = item.q;
  card.appendChild(text);
  if (item.code) { const pre = document.createElement("pre"); pre.textContent = item.code; card.appendChild(pre); }
  const expl = document.createElement("div"); expl.className = "expl";
  item.options.forEach((opt, oi) => {
    const b = document.createElement("button"); b.className = "opt";
    const lab = document.createElement("span"); lab.className = "lab"; lab.textContent = LAB[oi] + ".";
    b.appendChild(lab); b.appendChild(document.createTextNode(" " + opt));
    b.onclick = () => {
      if (card.dataset.locked) return;
      card.dataset.locked = "1";
      const opts = card.querySelectorAll(".opt");
      opts.forEach(o => o.classList.add("locked"));
      opts[item.answer].classList.add("correct");
      if (oi === item.answer) { correct++; } else { b.classList.add("wrong"); }
      answered++;
      document.getElementById("answered").textContent = answered;
      document.getElementById("correct").textContent = correct;
      expl.classList.add("show");
      if (answered === total) showSummary();
    };
    card.appendChild(b);
  });
  const eb = document.createElement("b"); eb.textContent = "Penjelasan: ";
  expl.appendChild(eb); expl.appendChild(document.createTextNode(item.explanation));
  card.appendChild(expl);
  quizEl.appendChild(card);
});
function showSummary(){
  const pct = Math.round(correct/total*100);
  const s = document.getElementById("summary"); s.classList.add("show");
  document.getElementById("finalscore").textContent = "Skor: " + correct + " / " + total + " (" + pct + "%)";
  let msg = pct>=80 ? "Hebat! Pemahaman kamu solid." : pct>=60 ? "Lumayan — ulas lagi materi yang masih salah." : "Ayo pelajari lagi modulnya, lalu coba ulangi.";
  document.getElementById("finalmsg").textContent = msg;
  s.scrollIntoView({behavior:"smooth"});
}
</script></body></html>
