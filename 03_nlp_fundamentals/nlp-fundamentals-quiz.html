<!doctype html><html lang="id"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NLP Fundamentals — Quiz</title>
<style>
:root{--bg:#1A1A2E;--card:#2D2D44;--green:#76B900;--lgreen:#A3D944;--white:#fff;
--gray:#AAAACC;--red:#EF5350;--dark:#23233A;}
*{box-sizing:border-box;}
body{font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
margin:0;background:var(--bg);color:var(--white);line-height:1.45;}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 60px;}
header{background:linear-gradient(135deg,var(--green),#5a8c00);border-radius:12px;
padding:16px 20px;margin-bottom:14px;}
header .mod{font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:.9;}
header h1{margin:2px 0 0;font-size:24px;}
header p{margin:4px 0 0;font-size:13px;opacity:.95;}
.scorebar{position:sticky;top:0;z-index:5;background:var(--dark);border:1px solid var(--card);
border-radius:10px;padding:8px 14px;margin-bottom:14px;display:flex;justify-content:space-between;
align-items:center;font-size:13px;}
.scorebar b{color:var(--lgreen);}
.q{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:12px;
border-left:4px solid var(--green);}
.q .num{color:var(--green);font-weight:700;font-size:12px;}
.q .text{font-size:15px;font-weight:600;margin:4px 0 8px;}
.q pre{background:var(--bg);color:var(--lgreen);font-family:"SF Mono",Menlo,Consolas,monospace;
font-size:12.5px;padding:9px 11px;border-radius:6px;overflow-x:auto;margin:0 0 9px;}
.opt{display:block;width:100%;text-align:left;background:var(--dark);color:var(--white);
border:1.5px solid #3a3a55;border-radius:8px;padding:9px 12px;margin:6px 0;font-size:14px;
cursor:pointer;transition:.12s;}
.opt:hover:not(.locked){border-color:var(--green);}
.opt .lab{display:inline-block;width:20px;font-weight:700;color:var(--gray);}
.opt.correct{background:rgba(118,185,0,.18);border-color:var(--green);}
.opt.correct .lab{color:var(--green);}
.opt.wrong{background:rgba(239,83,80,.16);border-color:var(--red);}
.opt.wrong .lab{color:var(--red);}
.opt.locked{cursor:default;}
.expl{display:none;font-size:13px;color:var(--gray);background:var(--bg);
border-radius:6px;padding:8px 11px;margin-top:8px;border-left:3px solid var(--lgreen);}
.expl.show{display:block;}
.expl b{color:var(--lgreen);}
.summary{display:none;background:var(--card);border-radius:12px;padding:20px;text-align:center;
margin-top:8px;border:2px solid var(--green);}
.summary.show{display:block;}
.summary .big{font-size:34px;font-weight:800;color:var(--green);}
.summary .msg{font-size:15px;color:var(--gray);margin:6px 0 14px;}
.btn{background:var(--green);color:#0d0d0d;border:none;border-radius:8px;padding:10px 22px;
font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{background:var(--lgreen);}
footer{text-align:center;color:var(--gray);font-size:11px;margin-top:18px;opacity:.7;}
</style></head>
<body><div class="wrap">
<header><div class="mod">Module 03 · Quiz Latihan</div><h1>NLP Fundamentals</h1>
<p>18 soal pilihan ganda · gaya sertifikasi · pilih satu jawaban</p></header>
<div class="scorebar"><span>Terjawab: <b id="answered">0</b> / 18</span>
<span>Benar: <b id="correct">0</b></span></div>
<div id="quiz"></div>
<div class="summary" id="summary"><div class="big" id="finalscore"></div>
<div class="msg" id="finalmsg"></div><button class="btn" onclick="location.reload()">Ulangi Quiz</button></div>
<footer>Navasena Gen-ML Course · Module 03 NLP Fundamentals — Quiz</footer>
</div>
<script>
const QUIZ = {"module": "03", "title": "NLP Fundamentals", "questions": [{"q": "Berdasarkan deck, apa definisi paling tepat dari NLP (Natural Language Processing)?", "code": null, "options": ["Cabang AI yang membuat komputer memahami dan memproses bahasa manusia, bukan sekadar string manipulation", "Teknik enkripsi teks agar aman dikirim antar komputer", "Library Python khusus untuk membersihkan data tabular numerik", "Metode kompresi file teks agar ukuran dokumen lebih kecil"], "answer": 0, "explanation": "Slide 'Definisi NLP' menyatakan NLP adalah cabang AI yang membuat komputer memahami dan memproses bahasa manusia, dan menegaskan ini bukan sekadar string manipulation."}, {"q": "Mengapa deck menyebut Bahasa Indonesia lebih menantang untuk NLP dibanding Bahasa Inggris?", "code": null, "options": ["Bahasa Indonesia tidak memiliki tanda baca sehingga sulit dipisah", "Imbuhan yang kaya (me-, -kan, -i, pe-, -an, ber-) membuat morfologi lebih kompleks", "Bahasa Indonesia menggunakan word order yang selalu berubah-ubah", "Bahasa Indonesia tidak didukung oleh komputer modern"], "answer": 1, "explanation": "Slide 'Tantangan Bahasa Manusia' menunjukkan Bahasa Inggris punya morphology sederhana, sedangkan Bahasa Indonesia punya imbuhan kaya seperti me-, -kan, -i, pe-, -an, ber- yang menambah kompleksitas."}, {"q": "Menurut deck, kombinasi library mana yang dipasangkan untuk masing-masing bahasa?", "code": null, "options": ["nlp-id + Sastrawi untuk Inggris, nltk + spacy untuk Indonesia", "TensorRT untuk Inggris, FAISS untuk Indonesia", "nltk + spacy untuk Inggris, nlp-id + Sastrawi untuk Indonesia", "pandas untuk Inggris, numpy untuk Indonesia"], "answer": 2, "explanation": "Slide 'Tantangan Bahasa Manusia' secara eksplisit menulis nltk + spacy untuk Inggris dan nlp-id + Sastrawi untuk Indonesia."}, {"q": "Apa yang dimaksud dengan 'token' dalam tahap tokenization?", "code": null, "options": ["Nilai numerik hasil training model machine learning", "Unit terkecil dari teks (kata, sub-kata, atau karakter)", "Label kategori akhir hasil klasifikasi teks", "Kunci API untuk mengakses model bahasa berbayar"], "answer": 1, "explanation": "Slide 'Tokenization' mendefinisikan token sebagai unit terkecil teks berupa kata, sub-kata, atau karakter; contohnya 'Saya belajar NLP' menjadi 3 token."}, {"q": "Fungsi/cara mana yang dipakai untuk tokenization menurut deck?", "code": null, "options": ["NLTK pakai word_tokenize(), spaCy pakai nlp(text)", "NLTK pakai polarity(), spaCy pakai download()", "NLTK pakai lemmatize(), spaCy pakai stopwords()", "NLTK pakai IndexFlatL2(), spaCy pakai from_pretrained()"], "answer": 0, "explanation": "Slide 'Tokenization' mencantumkan NLTK: word_tokenize() dan spaCy: nlp(text) sebagai cara melakukan tokenisasi."}, {"q": "Apa tujuan utama dari stopword removal?", "code": null, "options": ["Mengubah seluruh kata menjadi huruf kapital", "Menerjemahkan teks ke bahasa lain secara otomatis", "Menghapus kata-kata umum (seperti yang, di, dari, dan) agar fokus pada kata bermakna", "Memberi label kelas kata (POS) pada setiap token"], "answer": 2, "explanation": "Slide 'Stopword & Lemmatization' menjelaskan stopword removal menghapus kata-kata umum (yang, di, dari, dan) supaya fokus pada kata yang bermakna."}, {"q": "Menurut deck, apa keunggulan lemmatization dibanding stemming?", "code": null, "options": ["Lemmatization hanya bekerja untuk Bahasa Inggris, stemming untuk semua bahasa", "Lemmatization lebih cepat tetapi membuang makna kata", "Stemming menghasilkan bentuk kamus, lemmatization hanya memotong akhiran", "Lemmatization lebih akurat karena menghasilkan bentuk dasar (kamus) yang benar"], "answer": 3, "explanation": "Slide 'Stopword & Lemmatization' menyatakan lemmatization lebih akurat dari stemming karena memberi bentuk kamus, contohnya menjalankan menjadi jalan dan kebersihan menjadi bersih."}, {"q": "Pada kalimat ber-POS-tag berikut, label apa yang diberikan untuk kata 'membaca' dan 'buku'?", "code": "\"Saya membaca buku di perpustakaan.\"\nSaya->PRON  membaca->?  buku->?  di->ADP  perpustakaan->NOUN", "options": ["membaca = NOUN, buku = VERB", "membaca = VERB, buku = NOUN", "membaca = ADP, buku = PRON", "membaca = PRON, buku = ADP"], "answer": 1, "explanation": "Slide 'POS Tagging' menandai 'membaca' sebagai VERB (kata kerja) dan 'buku' sebagai NOUN (kata benda)."}, {"q": "Pada Named Entity Recognition (NER) untuk kalimat di deck, entitas mana yang dipasangkan dengan label yang benar?", "code": "\"Budi Santoso bekerja di Navasena di Jakarta sejak 2024.\"", "options": ["Budi Santoso = PERSON, Navasena = ORG, Jakarta = LOC", "Budi Santoso = ORG, Navasena = LOC, Jakarta = PERSON", "Budi Santoso = LOC, Navasena = PERSON, Jakarta = ORG", "Budi Santoso = NOUN, Navasena = VERB, Jakarta = ADP"], "answer": 0, "explanation": "Slide 'NER' menandai Budi Santoso sebagai PERSON, Navasena sebagai ORG, dan Jakarta sebagai LOC."}, {"q": "Dalam TextBlob untuk sentiment analysis, berapa rentang nilai polarity dan subjectivity menurut deck?", "code": null, "options": ["polarity in [0.0, 1.0], subjectivity in [-1.0, 1.0]", "polarity in [-1.0, 1.0], subjectivity in [0.0, 1.0]", "polarity in [0, 100], subjectivity in [0, 100]", "polarity in [-100, 100], subjectivity in [-1.0, 1.0]"], "answer": 1, "explanation": "Slide 'Sentiment Analysis' menyatakan TextBlob memberi polarity dalam rentang [-1.0, 1.0] dan subjectivity dalam rentang [0.0, 1.0]."}, {"q": "Pada contoh spam filter di deck, algoritma apa yang umum dipakai dan apa kebutuhan utamanya?", "code": null, "options": ["Naive Bayes, butuh data training berupa email yang sudah dilabeli", "K-Means, butuh GPU Tesla T4 untuk training", "Linear Regression, butuh data numerik kontinu", "FAISS IndexFlatL2, butuh embedding dari sentence-transformers"], "answer": 0, "explanation": "Slide 'Text Classification: Spam vs Ham' menyebut Naive Bayes sebagai algoritma umum dan menekankan butuh data training (email yang sudah dilabeli)."}, {"q": "Menurut slide 'Setup & Tools', apa kebutuhan runtime untuk NLP dasar di Google Colab?", "code": "!pip install nltk spacy textblob\n!pip install Sastrawi nlp-id\n!python -m spacy download en_core_web_sm", "options": ["Wajib GPU Tesla T4 dengan quantization bitsandbytes", "Wajib TPU agar tokenisasi berjalan cepat", "CPU sudah cukup; tidak perlu GPU untuk NLP dasar", "Harus menjalankan TensorRT terlebih dahulu"], "answer": 2, "explanation": "Slide 'Setup & Tools' menyatakan untuk Colab cukup pilih runtime CPU dan tidak perlu GPU untuk NLP dasar."}, {"q": "TF-IDF memberi skor similarity RENDAH untuk 'Saya suka makan nasi goreng' vs 'Saya gemar menyantap nasi goreng', padahal maknanya hampir sama. Kenapa?", "code": "", "options": ["Karena kedua kalimat memiliki jumlah kata yang berbeda", "Karena TF-IDF hanya mencocokkan kata yang persis sama, sedangkan 'suka'/'gemar' dan 'makan'/'menyantap' adalah kata berbeda", "Karena TF-IDF tidak bisa memproses bahasa Indonesia", "Karena kalimatnya terlalu pendek untuk dihitung TF-IDF"], "answer": 1, "explanation": "Slide 'Dari Menghitung Kata ke Memahami Makna': TF-IDF merepresentasikan teks sebagai hitungan kata, sehingga sinonim dianggap dimensi yang tidak berhubungan. Embedding menyelesaikan ini karena dilatih pada jutaan kalimat sehingga sinonim menghasilkan vektor berdekatan. TF-IDF tetap bisa memproses bahasa apa pun dan tidak bergantung pada panjang/jumlah kata."}, {"q": "Kenapa LLM modern memakai subword tokenization (BPE/WordPiece), bukan token per kata utuh?", "code": "tok.tokenize(\"mempelajari\")\n# hasil: beberapa potongan subword", "options": ["Supaya teks menjadi lebih pendek dan hemat memori", "Karena komputer tidak bisa menyimpan kata yang panjang", "Agar dengan kosakata terbatas (puluhan ribu subword) model tetap bisa menulis kata apa pun, termasuk kata yang tidak pernah dilihat saat training", "Karena subword membuat model selalu lebih akurat daripada token kata"], "answer": 2, "explanation": "Slide 'Subword Tokenization: Token ala LLM': kosakata ~30-50 ribu subword cukup untuk merangkai kata apa pun, termasuk kata baru dan kata berimbuhan. Subword justru sering membuat teks jadi LEBIH BANYAK token (bukan lebih pendek), dan tidak ada jaminan 'selalu lebih akurat'."}, {"q": "Untuk sentiment analysis teks bahasa Indonesia yang mengandung bahasa gaul ('Gw suka bgt...'), pendekatan mana yang paling tepat menurut materi?", "code": "", "options": ["TextBlob, karena library-nya paling sederhana", "Menghapus semua kata gaul terlebih dahulu, lalu memakai TextBlob", "Model transformer yang di-fine-tune untuk bahasa Indonesia (keluarga IndoBERT) via pipeline Hugging Face", "Menerjemahkan teks ke bahasa Inggris secara manual lalu memakai TextBlob"], "answer": 2, "explanation": "Slide 'Sentiment Indonesia dengan IndoBERT': TextBlob hanya akurat untuk English, sedangkan model keluarga IndoBERT dilatih pada teks Indonesia nyata (termasuk bahasa informal) sehingga tahan slang dan mengenali kelas netral. Menghapus kata gaul atau menerjemahkan manual justru membuang sinyal sentimen."}, {"q": "Apa yang dilakukan perintah `python -m cudf.pandas -m cuml.accel pipeline.py` terhadap script pandas/sklearn biasa?", "code": null, "options": ["Mengompilasi script menjadi binary CUDA agar tidak butuh Python lagi", "Menjalankan script tanpa modifikasi: operasi pandas/sklearn yang didukung dialihkan ke GPU (cuDF/cuML), sisanya fallback otomatis ke CPU", "Mengubah semua DataFrame menjadi numpy array agar lebih hemat memori", "Memaksa seluruh operasi jalan di GPU dan error jika ada yang tidak didukung"], "answer": 1, "explanation": "Notebook 02 Babak 1: cudf.pandas dan cuml.accel adalah mode akselerasi zero-code-change — kode tidak diubah, operasi yang didukung lari di GPU, dan yang belum didukung otomatis fallback ke CPU sehingga tidak pernah crash karena ini."}, {"q": "Pada benchmark notebook 02, kapan pemakaian GPU (cuDF/cuML) justru BISA lebih lambat daripada CPU?", "code": null, "options": ["Saat data berukuran kecil, karena overhead transfer CPU↔GPU lebih mahal daripada komputasinya sendiri", "Saat teks mengandung bahasa Indonesia, karena GPU hanya mendukung bahasa Inggris", "Saat memakai TF-IDF, karena TF-IDF tidak bisa diparalelkan", "GPU selalu lebih cepat dalam segala kondisi"], "answer": 0, "explanation": "Pola yang ditekankan di Babak 1 dan 4: GPU menang di skala. Untuk data kecil (mis. SmSA ±11 ribu dokumen) waktu transfer data ke GPU bisa melebihi penghematan komputasinya."}, {"q": "Mengapa MinHash dipakai saat menyiapkan korpus training LLM (seperti di notebook 02 Babak 3 dan NeMo Curator)?", "code": null, "options": ["Untuk mengenkripsi dokumen agar data training tidak bocor", "Untuk memampatkan dokumen sehingga muat di memori GPU", "Untuk menemukan dokumen near-duplicate secara efisien lewat sidik jari hash, tanpa membandingkan semua pasangan dokumen", "Untuk menghitung frekuensi kata lebih cepat daripada value_counts"], "answer": 2, "explanation": "Babak 3: membandingkan semua pasangan dari 150 ribu paragraf = miliaran perbandingan. MinHash meringkas tiap dokumen jadi sidik jari; dokumen mirip menghasilkan sidik jari sama dengan probabilitas tinggi, sehingga dedup cukup dengan satu groupby."}]};
window.QUIZ = QUIZ;
const LAB = ["A","B","C","D"];
let answered = 0, correct = 0;
const total = QUIZ.questions.length;
const quizEl = document.getElementById("quiz");

QUIZ.questions.forEach((item, qi) => {
  const card = document.createElement("div"); card.className = "q";
  const num = document.createElement("div"); num.className = "num"; num.textContent = "Soal " + (qi+1);
  card.appendChild(num);
  const text = document.createElement("div"); text.className = "text"; text.textContent = item.q;
  card.appendChild(text);
  if (item.code) { const pre = document.createElement("pre"); pre.textContent = item.code; card.appendChild(pre); }
  const expl = document.createElement("div"); expl.className = "expl";
  item.options.forEach((opt, oi) => {
    const b = document.createElement("button"); b.className = "opt";
    const lab = document.createElement("span"); lab.className = "lab"; lab.textContent = LAB[oi] + ".";
    b.appendChild(lab); b.appendChild(document.createTextNode(" " + opt));
    b.onclick = () => {
      if (card.dataset.locked) return;
      card.dataset.locked = "1";
      const opts = card.querySelectorAll(".opt");
      opts.forEach(o => o.classList.add("locked"));
      opts[item.answer].classList.add("correct");
      if (oi === item.answer) { correct++; }
      else { b.classList.add("wrong"); }
      answered++;
      document.getElementById("answered").textContent = answered;
      document.getElementById("correct").textContent = correct;
      expl.classList.add("show");
      if (answered === total) showSummary();
    };
    card.appendChild(b);
  });
  const eb = document.createElement("b"); eb.textContent = "Penjelasan: ";
  expl.appendChild(eb); expl.appendChild(document.createTextNode(item.explanation));
  card.appendChild(expl);
  quizEl.appendChild(card);
});

function showSummary(){
  const pct = Math.round(correct/total*100);
  const s = document.getElementById("summary"); s.classList.add("show");
  document.getElementById("finalscore").textContent = "Skor: " + correct + " / " + total + " (" + pct + "%)";
  let msg = pct>=80 ? "Hebat! Pemahaman kamu solid." : pct>=60 ? "Lumayan — ulas lagi materi yang masih salah." : "Ayo pelajari lagi modulnya, lalu coba ulangi.";
  document.getElementById("finalmsg").textContent = msg;
  s.scrollIntoView({behavior:"smooth"});
}
</script></body></html>
